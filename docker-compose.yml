version: "3.3"

services:

  jenkins:
    image: jenkins/jenkins:2.492
    ports:
    - "8080:8080"
    - "50000:50000"
    volumes:
    - ./jenkins:/var/jenkins_home
    restart: unless-stopped

  mails:
    image: mailhog/mailhog
    restart: unless-stopped
    ports:
    - "8025:8025"
    - "1025:1025"
